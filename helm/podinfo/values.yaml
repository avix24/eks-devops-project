# Number of pod replicas to run
replicaCount: 2

image:
  repository: stefanprodan/podinfo
  tag: "6.5.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 9898

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

health:
  livenessProbe:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 5

configmap:
  message: "Hello from EKS!"
  environment: "dev"