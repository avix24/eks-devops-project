name: EKS CI/CD Pipeline

on:
  push:
    branches:
      - main
      - feature/github-actions-cicd
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: eks-project/podinfo
  EKS_CLUSTER_NAME: eks-project-dev
  IMAGE_TAG: ${{ github.sha }}

jobs:

  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build-image.outputs.image }}
      image_tag: ${{ steps.build-image.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Slice to 8 characters — same as GitLab's CI_COMMIT_SHORT_SHA
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)

          # Build and push SHA-tagged image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA

          # Also push latest tag — same image, two tags
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Save outputs for downstream jobs
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image_tag=$SHORT_SHA" >> $GITHUB_OUTPUT

  verify:
    name: Security scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Placeholder
        run: echo "Verify stage - coming in Step 4"

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build, verify]
    steps:
      - name: Placeholder
        run: echo "Deploy stage - coming in Step 5"
